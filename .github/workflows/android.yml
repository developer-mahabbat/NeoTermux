name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973" "cmake;3.22.1" || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NeoTermux-APK
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: NeoTermux-Universal-APK
          path: app/build/outputs/apk/release/*universal*.apk
          if-no-files-found: warn

      - name: List APK outputs
        run: |
          echo "=== APK Output Files ==="
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APKs found"
          echo "=== Size ==="
          ls -lh app/build/outputs/apk/release/*.apk 2>/dev/null || echo "No release APKs"