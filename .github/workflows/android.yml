name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" "cmake;3.22.1" 2>&1 || \
          $ANDROID_HOME/tools/bin/sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" "cmake;3.22.1" 2>&1 || \
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" "cmake;3.22.1" 2>&1 || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 || \
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>&1 || \
          yes | sdkmanager --licenses 2>&1 || true

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: NeoTermux-APKs
          path: |
            **/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: List APK outputs
        run: |
          echo "=== APK Files ==="
          find . -path "*/build/outputs/apk/*" -name "*.apk" 2>/dev/null | head -20
          echo "=== Sizes ==="
          find . -path "*/build/outputs/apk/*" -name "*.apk" -exec ls -lh {} \; 2>/dev/null | head -20