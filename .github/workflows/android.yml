name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Download Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /opt/android-sdk
          mkdir -p /opt/android-sdk/cmdline-tools/latest
          mv /opt/android-sdk/cmdline-tools/* /opt/android-sdk/cmdline-tools/latest/ 2>/dev/null || true
          echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV
          echo "/opt/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install SDK packages
        run: |
          /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/opt/android-sdk "platforms;android-34" "build-tools;34.0.0" "ndk;27.0.12077973" "cmake;3.22.1" 2>&1
          yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/opt/android-sdk --licenses 2>&1 || true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          unset ANDROID_SDK_ROOT
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
        env:
          ANDROID_HOME: /opt/android-sdk

      - name: List artifacts
        if: always()
        run: find . -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "No APKs"

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NeoTermux-APKs
          path: "**/build/outputs/apk/**/*.apk"
          if-no-files-found: warn