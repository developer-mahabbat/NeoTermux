name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download and setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.10.2/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || \
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || \
          yes | sdkmanager --licenses || true

      - name: Install NDK and CMake
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1" || \
          $ANDROID_HOME/tools/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1" || \
          sdkmanager "ndk;27.0.12077973" "cmake;3.22.1" || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Build with Gradle
        run: ./gradlew assembleRelease --no-daemon --stacktrace || true

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NeoTermux-APK
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: NeoTermux-Universal-APK
          path: app/build/outputs/apk/release/*universal*.apk
          if-no-files-found: warn

      - name: List APK outputs
        run: |
          echo "=== APK Output Files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APKs found"
          ls -lh app/build/outputs/apk/release/*.apk 2>/dev/null || echo "No release APKs"
          ls -lh app/build/outputs/apk/debug/*.apk 2>/dev/null || echo "No debug APKs"